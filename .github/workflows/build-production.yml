name: Build Production Bundle

on:
  workflow_dispatch:
    inputs:
      site_url:
        description: Publiczny adres produkcyjny frontendu
        required: true
        default: https://multiserwis.example.com

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build:production
        env:
          SITE_ENVIRONMENT: production
          PUBLIC_SITE_URL: ${{ inputs.site_url }}
          PUBLIC_SITE_BASE_PATH: /

      - name: Upload production artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-dist
          path: dist